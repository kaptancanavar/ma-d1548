program: train_breast_gmaraft3d_sweep.py
method: grid

metric:
  name: loss/val
  goal: minimize

parameters:
  lr:
    values: [5e-5, 1e-4, 2e-4]
  reg_weight:
    values: [0.01, 0.05, 0.1]
  gamma:
    values: [0.8, 0.85, 0.9]
  sim_weight:
    value: 1.0

command:
  - ${env}
  - /home/students/studunals1/.conda/envs/biopsy_env/bin/python
  - ${program}
  - --train-csv
  - /mnt/ceph/vol_02_home_students/studunals1/biopsy_project/vxm/Analysis/train_lesion_0.csv
  - --val-csv
  - /mnt/ceph/vol_02_home_students/studunals1/biopsy_project/vxm/Analysis/val_lesion_0.csv
  - --out-root
  - /home/students/studunals1/biopsy_project/gmaraft3d/experiments_gmaraft
  - --epochs
  - "50"
  - --batch-size
  - "1"
  - --num-workers
  - "4"
  - --input-shape
  - "224"
  - "224"
  - "96"
  - --train-shape
  - "96"
  - "96"
  - "64"
  - --save-every
  - "10"
  - --wandb-project
  - breast-biopsy-gmaraft3d
  - --wandb-group
  - GMA_NCC_SWEEP_2
  - --wandb-mode
  - online
