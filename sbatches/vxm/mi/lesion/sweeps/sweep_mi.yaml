method: random

metric:
  name: loss/val_total
  goal: minimize

parameters:
  image-loss:
    value: mi

  epochs:
    value: 50

  lr:
    distribution: log_uniform_values
    min: 3e-5
    max: 3e-4

  reg-weight:
    distribution: log_uniform_values
    min: 0.3
    max: 10.0

  mi-bins:
    values: [16, 32]

  mi-samples:
    values: [5000, 20000]

  mi-sigma:
    value: 0.2

  mi-clip:
    value: 5.0

program: /home/students/studunals1/biopsy_project/vxm/scripts/vxm_train_lesion.py

command:
  - ${env}
  - /home/students/studunals1/.conda/envs/biopsy_env/bin/python
  - ${program}
  - --train-csv
  - /home/students/studunals1/biopsy_project/vxm/Analysis/train_lesion_0.csv
  - --val-csv
  - /home/students/studunals1/biopsy_project/vxm/Analysis/val_lesion_0.csv
  - --out-root
  - /home/students/studunals1/biopsy_project/vxm/mi/lesion/run
  - --input-shape
  - 224
  - 224
  - 96
  - --exp-id
  - MI_SWEEP
  - ${args}
